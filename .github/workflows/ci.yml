name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Lint (Turborepo)
        run: bun run lint

  test-cli:
    name: Test — create-headless-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: cd packages/create-headless-app && bun test

  test-hono:
    name: Test — api-hono
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Setup database
        run: cd apps/api-hono && bun run db:push
        env:
          JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
          DATABASE_URL: ./test.db

      - name: Run tests
        run: cd apps/api-hono && bun test
        env:
          JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
          DATABASE_URL: ./test.db

  test-laravel:
    name: Test — api-laravel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_sqlite, mbstring, xml
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: apps/api-laravel/vendor
          key: ${{ runner.os }}-composer-laravel-${{ hashFiles('apps/api-laravel/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-laravel-

      - name: Install Composer dependencies
        run: cd apps/api-laravel && composer install --no-interaction --prefer-dist

      - name: Copy .env
        run: cd apps/api-laravel && cp .env.example .env

      - name: Configure CI environment
        run: |
          cd apps/api-laravel
          sed -i 's/DB_CONNECTION=pgsql/DB_CONNECTION=sqlite/' .env
          sed -i '/DB_HOST/d; /DB_PORT/d; /DB_DATABASE=rbac_app/d; /DB_USERNAME/d; /DB_PASSWORD/d' .env
          echo "DB_DATABASE=:memory:" >> .env
          echo "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env

      - name: Generate application key
        run: cd apps/api-laravel && php artisan key:generate --force

      - name: Run migrations
        run: cd apps/api-laravel && php artisan migrate --force

      - name: Run tests
        run: cd apps/api-laravel && php artisan test

  test-symfony:
    name: Test — api-sf
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_sqlite, mbstring, xml, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: apps/api-sf/vendor
          key: ${{ runner.os }}-composer-symfony-${{ hashFiles('apps/api-sf/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-symfony-

      - name: Setup environment
        run: cd apps/api-sf && cp .env.example .env

      - name: Install Composer dependencies
        run: cd apps/api-sf && composer install --no-interaction --prefer-dist

      - name: Create database schema
        run: cd apps/api-sf && php bin/console doctrine:schema:create --env=test

      - name: Run tests
        run: cd apps/api-sf && php bin/phpunit
