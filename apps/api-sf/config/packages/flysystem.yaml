flysystem:
    storages:
        default.storage:
            adapter: 'local'
            options:
                directory: '%kernel.project_dir%/var/storage'

        s3.storage:
            adapter: 'aws'
            options:
                client: 'aws_s3_client'
                bucket: '%env(AWS_BUCKET)%'

services:
    aws_s3_client:
        class: Aws\S3\S3Client
        arguments:
            - version: 'latest'
              region: '%env(AWS_DEFAULT_REGION)%'
              endpoint: '%env(resolve:AWS_ENDPOINT)%'
              use_path_style_endpoint: '%env(bool:AWS_USE_PATH_STYLE_ENDPOINT)%'
              credentials:
                  key: '%env(AWS_ACCESS_KEY_ID)%'
                  secret: '%env(AWS_SECRET_ACCESS_KEY)%'
