name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Lint (Turborepo)
        run: bun run lint

      - name: Typecheck packages/core
        run: cd packages/core && bunx tsc --noEmit

      - name: Typecheck packages/bff-nextjs
        run: cd packages/bff-nextjs && bunx tsc --noEmit

      - name: Typecheck packages/types
        run: cd packages/types && bunx tsc --noEmit

  test-core:
    name: Test — @headless/core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: cd packages/core && bun test

  test-cli:
    name: Test — create-headless-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: cd packages/create-headless-app && bun test

  test-hono:
    name: Test — api-hono
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: cd apps/api-hono && bun test

  test-laravel:
    name: Test — api-laravel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, mbstring, xml
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: apps/api-laravel/vendor
          key: ${{ runner.os }}-composer-laravel-${{ hashFiles('apps/api-laravel/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-laravel-

      - name: Install Composer dependencies
        run: cd apps/api-laravel && composer install --no-interaction --prefer-dist

      - name: Copy .env
        run: cd apps/api-laravel && cp .env.example .env || true

      - name: Generate application key
        run: cd apps/api-laravel && php artisan key:generate --force || true

      - name: Run tests
        run: cd apps/api-laravel && php artisan test

  test-symfony:
    name: Test — api-sf
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, mbstring, xml, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: apps/api-sf/vendor
          key: ${{ runner.os }}-composer-symfony-${{ hashFiles('apps/api-sf/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-symfony-

      - name: Install Composer dependencies
        run: cd apps/api-sf && composer install --no-interaction --prefer-dist

      - name: Run tests
        run: cd apps/api-sf && php bin/phpunit
