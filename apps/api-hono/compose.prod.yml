services:
  api-hono:
    profiles: ["hono", "backend", "all"]
    image: headless-kit/api-hono:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: headless-api-hono
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: /app/data/hono.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in production}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      BFF_ORIGIN: ${BFF_ORIGIN:-}
    ports:
      - "3333:3333"
    volumes:
      - hono_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  hono_data:
    name: headless_hono_data
