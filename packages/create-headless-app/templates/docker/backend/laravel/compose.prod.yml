services:
  api:
    profiles: ["api", "backend", "all"]
    image: {{PROJECT_NAME}}/api:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: {{PROJECT_NAME}}-api
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?APP_KEY is required in production}
      APP_URL: ${APP_URL:?APP_URL is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/data/{{PROJECT_NAME}}.db
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      SERVER_NAME: ":8002"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
    ports:
      - "8002:8002"
    volumes:
      - api_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  api_data:
    name: {{PROJECT_NAME}}_api_data
