services:
  api-hono:
    profiles: ["hono", "backend", "all"]
    image: headless-kit/api-hono:dev
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    container_name: headless-api-hono
    working_dir: /app
    command: ["sh", "-c", "bun install && bun run scripts/migrate.ts && bun run --watch src/index.ts"]
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: /app/data/hono.db
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production-min-32-chars}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3300}
      BFF_ORIGIN: ${BFF_ORIGIN:-http://localhost:3301}
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3333/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
