services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "{{FRONTEND_PORT}}:{{FRONTEND_PORT}}"
    environment:
      - NODE_ENV=production
      - AUTH_BACKEND=symfony
      - SYMFONY_API_URL=http://api:8002
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - APP_ENV=prod
      - APP_SECRET={{APP_SECRET}}
      - DATABASE_URL=postgresql://postgres:{{DB_PASSWORD}}@db:5432/{{PROJECT_NAME}}?serverVersion=16&charset=utf8
      - BETTER_AUTH_SECRET={{BETTER_AUTH_SECRET}}
      - FRONTEND_URL=http://localhost:{{FRONTEND_PORT}}
      - MAILER_DSN=smtp://mailpit:1025
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api-var:/var/www/html/var
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: {{PROJECT_NAME}}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: {{DB_PASSWORD}}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
  api-var:
