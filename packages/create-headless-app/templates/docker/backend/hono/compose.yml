services:
  api:
    profiles: ["api", "backend", "all"]
    image: {{PROJECT_NAME}}/api:dev
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    container_name: {{PROJECT_NAME}}-api
    working_dir: /app
    command: ["sh", "-c", "bun install && bun run scripts/migrate.ts && bun run --watch src/index.ts"]
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: /app/data/{{PROJECT_NAME}}.db
      JWT_SECRET: ${JWT_SECRET:-{{JWT_SECRET}}}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:{{FRONTEND_PORT}}}
      BFF_ORIGIN: ${BFF_ORIGIN:-}
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3333/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
