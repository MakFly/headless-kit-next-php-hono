services:
  api:
    profiles: ["api", "backend", "all"]
    image: {{PROJECT_NAME}}/api:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: {{PROJECT_NAME}}-api
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: /app/data/{{PROJECT_NAME}}.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in production}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      BFF_ORIGIN: ${BFF_ORIGIN:-}
    ports:
      - "3333:3333"
    volumes:
      - api_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  api_data:
    name: {{PROJECT_NAME}}_api_data
